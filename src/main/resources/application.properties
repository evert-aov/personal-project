spring.application.name=schedule_assignment

# Server Configuration
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/personal_project}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:nakroth}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://192.168.100.125:4200,http://127.0.0.1:4200,https://*.vercel.app,https://persnal-project-front*.vercel.app}

# JPA/Hibernate - IMPORTANTE: usar 'none' con Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# OnlyOffice Document Server integration
onlyoffice.document-server-url=${ONLYOFFICE_DOC_SERVER_URL:http://192.168.100.125:8088}
onlyoffice.callback-base-url=${ONLYOFFICE_CALLBACK_BASE_URL:http://192.168.100.125:8080}
onlyoffice.jwt.secret=${ONLYOFFICE_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.storage.notes-dir=./storage/notes

# Azure Storage Configuration
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:notes}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=true
